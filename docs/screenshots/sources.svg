<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" role="img" aria-labelledby="title desc"><title id="title">Quellenverwaltung mit Crawler-Vorschau</title><desc id="desc">Quellen-Seite mit neuer Crawl-Vorschau, Beispielquelle und letzten Artikeln.</desc><rect width="1440" height="1080" fill="#09090b"/><rect y="0" width="1440" height="72" fill="#111827"/><g font-family="Inter,Arial,sans-serif"><text x="28" y="45" fill="#fafafa" font-size="20" font-weight="700">YouTube News Studio</text><text x="430" y="45" fill="#93c5fd" font-size="18">Quellen</text><text x="120" y="135" fill="#fca5a5" font-size="16" font-weight="800" letter-spacing="2">QUELLENVERWALTUNG</text><text x="120" y="190" fill="#fafafa" font-size="48" font-weight="800">Quellen</text><rect x="1060" y="145" width="260" height="34" rx="17" fill="#2563eb"/><text x="1085" y="168" fill="#fff" font-size="16">2 Treffer · 2 aktiv · 1 fällig</text><rect x="120" y="220" width="1200" height="62" rx="18" fill="#18181b" stroke="#27272a"/><rect x="150" y="238" width="560" height="28" rx="10" fill="#0f172a" stroke="#3f3f46"/><text x="170" y="258" fill="#a1a1aa" font-size="15">Quelle oder URL suchen</text><rect x="730" y="238" width="180" height="28" rx="10" fill="#0f172a" stroke="#3f3f46"/><text x="750" y="258" fill="#fafafa" font-size="15">Alle Quellen</text><rect x="930" y="238" width="110" height="28" rx="10" fill="#dc2626"/><text x="960" y="258" fill="#fff" font-size="15" font-weight="800">Filtern</text><rect x="120" y="305" width="1200" height="238" rx="18" fill="#18181b" stroke="#27272a"/><text x="150" y="355" fill="#fafafa" font-size="28" font-weight="700">Crawler-Vorschau testen</text><text x="150" y="390" fill="#a1a1aa" font-size="17">Prüfe Startseite oder Feed vor dem Speichern. Die Vorschau importiert nichts.</text><rect x="150" y="416" width="810" height="48" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="172" y="446" fill="#fafafa" font-size="17">https://www.bild.de</text><rect x="980" y="416" width="190" height="48" rx="12" fill="#dc2626"/><text x="1015" y="446" fill="#fff" font-size="17" font-weight="800">Vorschau laden</text><rect x="150" y="480" width="980" height="42" rx="14" fill="#0f172a" stroke="#334155"/><text x="172" y="506" fill="#fafafa" font-size="16" font-weight="700">6 gefundene Artikel</text><rect x="1010" y="489" width="100" height="24" rx="12" fill="#3f3f46"/><text x="1027" y="506" fill="#fff" font-size="13">Nur Vorschau</text><text x="360" y="506" fill="#93c5fd" font-size="15">Bundesregierung beschließt neues Entlastungspaket für Familien</text><rect x="120" y="570" width="1200" height="210" rx="18" fill="#18181b" stroke="#27272a"/><text x="150" y="622" fill="#fafafa" font-size="28" font-weight="700">Neue RSS- oder Webseiten-URL anlegen</text><text x="150" y="658" fill="#a1a1aa" font-size="17">Crawler erkennt RSS, JSON-LD-NewsArticle-Daten und typische Artikel-Links.</text><rect x="870" y="638" width="175" height="28" rx="8" fill="#0f172a"/><text x="884" y="658" fill="#bbf7d0" font-size="15">https://www.bild.de</text><rect x="150" y="690" width="300" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="172" y="723" fill="#a1a1aa" font-size="17">Quelle</text><rect x="470" y="690" width="520" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="492" y="723" fill="#a1a1aa" font-size="17">https://.../rss</text><rect x="1010" y="690" width="150" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="1065" y="723" fill="#fafafa" font-size="17">30</text><g transform="translate(120 815)"><rect width="1200" height="225" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="50" fill="#fafafa" font-size="26" font-weight="700">BILD Test</text><rect x="1080" y="28" width="80" height="34" rx="17" fill="#2563eb"/><text x="1105" y="50" fill="#fff" font-size="15">aktiv</text><text x="30" y="92" fill="#a1a1aa" font-size="17">https://www.bild.de</text><text x="30" y="130" fill="#fafafa" font-size="18">10 Artikel · alle 30 min</text><rect x="30" y="150" width="690" height="52" rx="14" fill="#0f172a" stroke="#334155"/><text x="50" y="182" fill="#93c5fd" font-size="16">Letzte Artikel: Politik, Sport und aktuelle Meldungen aus dem Crawl</text><rect x="760" y="155" width="150" height="42" rx="12" fill="#dc2626"/><text x="787" y="182" fill="#fff" font-size="15" font-weight="800">Jetzt crawlen</text></g></g></svg>
