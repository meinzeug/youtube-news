<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" role="img" aria-labelledby="title desc"><title id="title">Quellenverwaltung mit Crawl-Vorschau</title><desc id="desc">Quellen-Seite mit Crawler-Hinweis, Filterleiste, Beispielquelle BILD und Liste zuletzt gefundener Artikel.</desc><rect width="1440" height="1000" fill="#09090b"/><rect y="0" width="1440" height="72" fill="#111827"/><g font-family="Inter,Arial,sans-serif"><text x="28" y="45" fill="#fafafa" font-size="20" font-weight="700">YouTube News Studio</text><text x="430" y="45" fill="#93c5fd" font-size="18">Quellen</text><text x="120" y="135" fill="#fca5a5" font-size="16" font-weight="800" letter-spacing="2">QUELLENVERWALTUNG</text><text x="120" y="190" fill="#fafafa" font-size="48" font-weight="800">Quellen</text><rect x="1085" y="145" width="235" height="34" rx="17" fill="#2563eb"/><text x="1110" y="168" fill="#fff" font-size="16">1 Treffer · 1 aktiv · 0 fällig</text><rect x="120" y="220" width="1200" height="62" rx="18" fill="#18181b" stroke="#27272a"/><rect x="150" y="238" width="560" height="28" rx="10" fill="#0f172a" stroke="#3f3f46"/><text x="170" y="258" fill="#a1a1aa" font-size="15">Quelle oder URL suchen</text><rect x="730" y="238" width="180" height="28" rx="10" fill="#0f172a" stroke="#3f3f46"/><text x="750" y="258" fill="#fafafa" font-size="15">Alle Quellen</text><rect x="930" y="238" width="110" height="28" rx="10" fill="#dc2626"/><text x="960" y="258" fill="#fff" font-size="15" font-weight="800">Filtern</text><rect x="120" y="310" width="1200" height="245" rx="18" fill="#18181b" stroke="#27272a"/><text x="150" y="362" fill="#fafafa" font-size="28" font-weight="700">Neue RSS- oder Webseiten-URL anlegen</text><text x="150" y="398" fill="#a1a1aa" font-size="17">Crawler erkennt RSS, JSON-LD-NewsArticle-Daten und typische Artikel-Links auf HTML-Startseiten.</text><rect x="870" y="378" width="175" height="28" rx="8" fill="#0f172a"/><text x="884" y="398" fill="#bbf7d0" font-size="15">https://www.bild.de</text><rect x="150" y="425" width="300" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="172" y="458" fill="#a1a1aa" font-size="17">Quelle</text><rect x="470" y="425" width="520" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="492" y="458" fill="#a1a1aa" font-size="17">https://.../rss</text><rect x="1010" y="425" width="150" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="1065" y="458" fill="#fafafa" font-size="17">30</text><rect x="150" y="490" width="220" height="44" rx="12" fill="#dc2626"/><text x="190" y="518" fill="#fff" font-size="17" font-weight="800">Quelle speichern</text><g transform="translate(120 595)"><rect width="1200" height="320" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="50" fill="#fafafa" font-size="26" font-weight="700">BILD Test</text><rect x="1080" y="28" width="80" height="34" rx="17" fill="#2563eb"/><text x="1105" y="50" fill="#fff" font-size="15">aktiv</text><text x="30" y="92" fill="#a1a1aa" font-size="17">https://www.bild.de</text><text x="30" y="130" fill="#fafafa" font-size="18">10 Artikel · alle 30 min</text><rect x="30" y="150" width="82" height="30" rx="15" fill="#15803d"/><text x="52" y="170" fill="#fff" font-size="14">geplant</text><rect x="126" y="150" width="250" height="30" rx="15" fill="#3f3f46"/><text x="144" y="170" fill="#fff" font-size="14">Nächster Crawl: 2026-07-01T...</text><rect x="30" y="198" width="690" height="92" rx="14" fill="#0f172a" stroke="#334155"/><text x="50" y="225" fill="#fafafa" font-size="17" font-weight="700">Letzte Artikel</text><text x="50" y="254" fill="#93c5fd" font-size="16">Politik: aktuelle Meldung aus dem Crawl</text><rect x="585" y="237" width="78" height="24" rx="12" fill="#3f3f46"/><text x="602" y="254" fill="#fff" font-size="13">new</text><text x="50" y="279" fill="#93c5fd" font-size="16">Sport: Beispielartikel aus HTML-Startseite</text><rect x="760" y="218" width="150" height="42" rx="12" fill="#dc26