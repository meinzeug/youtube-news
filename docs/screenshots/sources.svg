<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" role="img" aria-labelledby="title desc"><title id="title">Quellenverwaltung</title><desc id="desc">Quellen-Seite mit Formular zum Anlegen von RSS- oder Webseiten-URLs und Karten für aktive Quellen.</desc><rect width="1440" height="1000" fill="#09090b"/><rect y="0" width="1440" height="72" fill="#111827"/><g font-family="Inter,Arial,sans-serif"><text x="28" y="45" fill="#fafafa" font-size="20" font-weight="700">YouTube News Studio</text><text x="430" y="45" fill="#93c5fd" font-size="18">Quellen</text><text x="120" y="135" fill="#fca5a5" font-size="16" font-weight="800" letter-spacing="2">QUELLENVERWALTUNG</text><text x="120" y="190" fill="#fafafa" font-size="48" font-weight="800">Quellen</text><rect x="1180" y="145" width="115" height="34" rx="17" fill="#2563eb"/><text x="1205" y="168" fill="#fff" font-size="16">0 angelegt</text><rect x="120" y="230" width="1200" height="230" rx="18" fill="#18181b" stroke="#27272a"/><text x="150" y="285" fill="#fafafa" font-size="28" font-weight="700">Neue RSS- oder Webseiten-URL anlegen</text><rect x="150" y="320" width="300" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="172" y="353" fill="#a1a1aa" font-size="17">Quelle</text><rect x="470" y="320" width="520" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="492" y="353" fill="#a1a1aa" font-size="17">https://.../rss</text><rect x="1010" y="320" width="150" height="52" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="1065" y="353" fill="#fafafa" font-size="17">30</text><rect x="150" y="390" width="220" height="50" rx="12" fill="#dc2626"/><text x="190" y="422" fill="#fff" font-size="17" font-weight="800">Quelle speichern</text><g transform="translate(120 510)"><rect width="585" height="210" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="50" fill="#fafafa" font-size="26" font-weight="700">Beispiel: Nachrichten RSS</text><rect x="465" y="28" width="80" height="34" rx="17" fill="#2563eb"/><text x="490" y="50" fill="#fff" font-size="15">aktiv</text><text x="30" y="92" fill="#a1a1aa" font-size="17">https://example.com/rss</text><text x="30" y="130" fill="#fafafa" font-size="18">12 Artikel · alle 30 min</text><rect x="30" y="150" width="150" height="40" rx="12" fill="#dc2626"/><text x="57" y="176" fill="#fff" font-size="15" font-weight="800">Jetzt crawlen</text><rect x="195" y="150" width="120" height="40" rx="12" fill="#1f2937" stroke="#374151"/><text x="225" y="176" fill="#fff" font-size="15" font-weight="800">Pausieren</text></g></g></svg>
