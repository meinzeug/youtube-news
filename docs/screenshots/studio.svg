<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" role="img" aria-labelledby="title desc"><title id="title">Automations-Studio</title><desc id="desc">Studio-Seite mit Pipeline-Start, Status und vier Produktionsschritten.</desc><rect width="1440" height="1000" fill="#09090b"/><rect y="0" width="1440" height="72" fill="#111827"/><g font-family="Inter,Arial,sans-serif"><text x="28" y="45" fill="#fafafa" font-size="20" font-weight="700">YouTube News Studio</text><text x="700" y="45" fill="#93c5fd" font-size="18">Studio</text><text x="120" y="160" fill="#fafafa" font-size="50" font-weight="800">Automations-Studio</text><g transform="translate(120 215)"><rect width="585" height="210" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="60" fill="#d4d4d8" font-size="21">Startet Crawl + Produktionspipeline mit den Web-Einstellungen.</text><rect x="30" y="105" width="240" height="52" rx="12" fill="#dc2626"/><text x="62" y="138" fill="#fff" font-size="18" font-weight="800">Pipeline jetzt starten</text></g><g transform="translate(735 215)"><rect width="585" height="210" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="55" fill="#fafafa" font-size="30" font-weight="700">Status</text><rect x="30" y="78" width="82" height="34" rx="17" fill="#2563eb"/><text x="51" y="100" fill="#fff" font-size="15">inaktiv</text><text x="125" y="100" fill="#d4d4d8" font-size="18">alle 60 Minuten · 1 Artikel/Lauf</text><text x="30" y="145" fill="#d4d4d8" font-size="19">0 Artikel warten auf Verarbeitung.</text><text x="30" y="180" fill="#93c5fd" font-size="18">Automation konfigurieren</text></g><text x="120" y="500" fill="#fafafa" font-size="34" font-weight="700">Letzte Aktivitäten</text><rect x="120" y="530" width="1200" height="82" rx="18" fill="#18181b" stroke="#27272a"/><g transform="translate(120 660)"><rect width="278" height="160" rx="18" fill="#18181b" stroke="#27272a"/><text x="25" y="50" fill="#fafafa" font-size="24" font-weight="700">1. Crawl</text><text x="25" y="92" fill="#a1a1aa" font-size="18">RSS/HTML Quellen werden</text><text x="25" y="120" fill="#a1a1aa" font-size="18">dedupliziert.</text></g><g transform="translate(428 660)"><rect width="278" height="160" rx="18" fill="#18181b" stroke="#27272a"/><text x="25" y="50" fill="#fafafa" font-size="24" font-weight="700">2. KI Skript</text><text x="25" y="92" fill="#a1a1aa" font-size="18">OpenRouter schreibt</text><text x="25" y="120" fill="#a1a1aa" font-size="18">deutschen Text.</text></g><g transform="translate(736 660)"><rect width="278" height="160" rx="18" fill="#18181b" stroke="#27272a"/><text x="25" y="50" fill="#fafafa" font-size="24" font-weight="700">3. Audio &amp; Bild</text><text x="25" y="92" fill="#a1a1aa" font-size="18">TTS oder FFmpeg-Fallback;</text><text x="25" y="120" fill="#a1a1aa" font-size="18">SVG-Bildgenerator.</text></g><g transform="translate(1044 660)"><rect width="278" height="160" rx="18" fill="#18181b" stroke="#27272a"/><text x="25" y="50" fill="#fafafa" font-size="24" font-weight="700">4. Video &amp; Upload</text><text x="25" y="92" fill="#a1a1aa" font-size="18">FFmpeg rendert MP4,</text><text x="25" y="120" fill="#a1a1aa" font-size="18">Upload-API vorbereitet.</text></g></g></svg>
