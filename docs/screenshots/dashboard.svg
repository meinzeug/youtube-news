<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" role="img" aria-labelledby="title desc"><title id="title">Dashboard der YouTube News Studio Weboberfläche</title><desc id="desc">Startseite mit Hero-Bereich, Schnellaktionen, Statistik-Karten, Produktionsstatus und letzten Aktivitäten.</desc><rect width="1440" height="1000" fill="#09090b"/><rect y="0" width="1440" height="72" fill="#111827"/><g font-family="Inter,Arial,sans-serif"><text x="28" y="45" fill="#fafafa" font-size="20" font-weight="700">YouTube News Studio</text><text x="310" y="45" fill="#93c5fd" font-size="18">Dashboard</text><text x="430" y="45" fill="#93c5fd" font-size="18">Quellen</text><text x="535" y="45" fill="#93c5fd" font-size="18">News &amp; Videos</text><text x="700" y="45" fill="#93c5fd" font-size="18">Studio</text><text x="790" y="45" fill="#93c5fd" font-size="18">Einstellungen</text><rect x="120" y="120" width="1200" height="275" rx="28" fill="#111827"/><circle cx="170" cy="120" r="270" fill="#dc2626" opacity=".25"/><text x="165" y="175" fill="#fca5a5" font-size="16" font-weight="800" letter-spacing="2">AUTONOMES PRODUKTIONS-DASHBOARD</text><text x="165" y="240" fill="#fafafa" font-size="56" font-weight="800">Autonomes YouTube News Studio</text><text x="165" y="292" fill="#d4d4d8" font-size="24">Crawlt Quellen, schreibt News um, erzeugt Audio, Thumbnail, Video und Uploads.</text><rect x="1040" y="195" width="210" height="54" rx="12" fill="#dc2626"/><text x="1080" y="230" fill="#fff" font-size="18" font-weight="800">Pipeline starten</text><rect x="1040" y="270" width="210" height="54" rx="12" fill="#1f2937" stroke="#374151"/><text x="1070" y="305" fill="#fff" font-size="18" font-weight="800">Quelle hinzufügen</text><g transform="translate(120 430)"><rect width="380" height="165" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="45" fill="#a5b4fc" font-size="18" font-weight="800">Quellen</text><text x="30" y="105" fill="#fafafa" font-size="52" font-weight="800">0</text><text x="30" y="140" fill="#a1a1aa" font-size="18">0 aktiv</text></g><g transform="translate(530 430)"><rect width="380" height="165" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="45" fill="#a5b4fc" font-size="18" font-weight="800">Artikel</text><text x="30" y="105" fill="#fafafa" font-size="52" font-weight="800">0</text><text x="30" y="140" fill="#a1a1aa" font-size="18">0 in Warteschlange</text></g><g transform="translate(940 430)"><rect width="380" height="165" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="45" fill="#a5b4fc" font-size="18" font-weight="800">Videos</text><text x="30" y="105" fill="#fafafa" font-size="52" font-weight="800">0</text><text x="30" y="140" fill="#a1a1aa" font-size="18">bereit zum Upload</text></g><g transform="translate(120 630)"><rect width="585" height="230" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="50" fill="#fafafa" font-size="28" font-weight="700">Produktionsstatus</text><rect x="30" y="85" width="525" height="70" rx="14" fill="#0f172a"/><text x="55" y="128" fill="#a1a1aa" font-size="18">Noch keine Artikel vorhanden. Lege zuerst Quellen an.</text></g><g transform="translate(735 630)"><rect width="585" height="230" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="50" fill="#fafafa" font-size="28" font-weight="700">Zuletzt aktualisiert</text><rect x="30" y="85" width="525" height="70" rx="14" fill="#0f172a"/><text x="55" y="128" fill="#a1a1aa" font-size="18">Noch keine Aktivitäten.</text></g></g></svg>
