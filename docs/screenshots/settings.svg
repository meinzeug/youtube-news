<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1120" viewBox="0 0 1440 1120" role="img" aria-labelledby="title desc"><title id="title">Einstellungen mit Social Media</title><desc id="desc">Einstellungsseite für Dienste, YouTube-Video-Produktion, Social-Media-Verteilung und Web-Automatisierung mit Cron.</desc><rect width="1440" height="1120" fill="#09090b"/><rect y="0" width="1440" height="72" fill="#111827"/><g font-family="Inter,Arial,sans-serif"><text x="28" y="45" fill="#fafafa" font-size="20" font-weight="700">YouTube News Studio</text><text x="790" y="45" fill="#93c5fd" font-size="18">Einstellungen</text><text x="120" y="140" fill="#fafafa" font-size="50" font-weight="800">Einstellungen</text><g transform="translate(120 190)"><rect width="380" height="360" rx="18" fill="#18181b" stroke="#27272a"/><text x="24" y="48" fill="#fafafa" font-size="28" font-weight="700">Dienste</text><text x="24" y="92" fill="#fafafa" font-size="16" font-weight="700">OpenRouter API Key</text><rect x="24" y="104" width="332" height="44" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="24" y="178" fill="#fafafa" font-size="16" font-weight="700">Textmodell</text><rect x="24" y="190" width="332" height="44" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="42" y="218" fill="#fafafa" font-size="14">openai/gpt-4.1-mini</text><text x="24" y="264" fill="#fafafa" font-size="16" font-weight="700">YouTube OAuth Client ID</text><rect x="24" y="276" width="332" height="44" rx="12" fill="#0f172a" stroke="#3f3f46"/></g><g transform="translate(530 190)"><rect width="380" height="360" rx="18" fill="#18181b" stroke="#27272a"/><text x="24" y="48" fill="#fafafa" font-size="28" font-weight="700">YouTube-Video</text><text x="24" y="86" fill="#a1a1aa" font-size="15">Format, Intro, Outro, Bauchbinde und KI-Regie.</text><rect x="24" y="118" width="150" height="44" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="45" y="146" fill="#fafafa" font-size="14">16:9 YouTube</text><rect x="190" y="118"