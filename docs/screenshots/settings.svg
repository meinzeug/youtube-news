<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" role="img" aria-labelledby="title desc"><title id="title">Einstellungen</title><desc id="desc">Einstellungsseite für Dienste, OpenRouter, ElevenLabs, YouTube und Web-Automatisierung mit Cron.</desc><rect width="1440" height="1000" fill="#09090b"/><rect y="0" width="1440" height="72" fill="#111827"/><g font-family="Inter,Arial,sans-serif"><text x="28" y="45" fill="#fafafa" font-size="20" font-weight="700">YouTube News Studio</text><text x="790" y="45" fill="#93c5fd" font-size="18">Einstellungen</text><text x="120" y="160" fill="#fafafa" font-size="50" font-weight="800">Einstellungen</text><g transform="translate(120 220)"><rect width="585" height="650" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="55" fill="#fafafa" font-size="30" font-weight="700">Dienste</text><text x="30" y="105" fill="#fafafa" font-size="17" font-weight="700">OpenRouter API Key</text><rect x="30" y="118" width="525" height="48" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="30" y="202" fill="#fafafa" font-size="17" font-weight="700">Textmodell</text><rect x="30" y="215" width="525" height="48" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="50" y="246" fill="#fafafa" font-size="16">openai/gpt-4.1-mini</text><text x="30" y="300" fill="#fafafa" font-size="17" font-weight="700">ElevenLabs API Key</text><rect x="30" y="313" width="525" height="48" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="30" y="397" fill="#fafafa" font-size="17" font-weight="700">YouTube OAuth Client ID</text><rect x="30" y="410" width="525" height="48" rx="12" fill="#0f172a" stroke="#3f3f46"/><rect x="30" y="500" width="180" height="50" rx="12" fill="#dc2626"/><text x="80" y="532" fill="#fff" font-size="17" font-weight="800">Speichern</text></g><g transform="translate(735 220)"><rect width="585" height="650" rx="18" fill="#18181b" stroke="#27272a"/><text x="30" y="55" fill="#fafafa" font-size="30" font-weight="700">Web-Automatisierung &amp; Cron</text><text x="30" y="95" fill="#a1a1aa" font-size="17">Automatisierung sicher per Benutzer-Crontab oder optional per sudo.</text><rect x="30" y="122" width="130" height="34" rx="17" fill="#3f3f46"/><text x="52" y="144" fill="#fff" font-size="14">Automation aus</text><rect x="170" y="122" width="150" height="34" rx="17" fill="#3f3f46"/><text x="192" y="144" fill="#fff" font-size="14">Benutzer-Cron inaktiv</text><text x="30" y="200" fill="#fafafa" font-size="17" font-weight="700">Intervall in Minuten</text><rect x="30" y="213" width="525" height="48" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="50" y="244" fill="#fafafa" font-size="16">60</text><text x="30" y="300" fill="#fafafa" font-size="17" font-weight="700">Max. Artikel pro Lauf</text><rect x="30" y="313" width="525" height="48" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="50" y="344" fill="#fafafa" font-size="16">1</text><text x="30" y="400" fill="#fafafa" font-size="17" font-weight="700">Cron-Rechte</text><rect x="30" y="413" width="525" height="48" rx="12" fill="#0f172a" stroke="#3f3f46"/><text x="50" y="444" fill="#fafafa" font-size="16">Benutzer-Crontab (empfohlen)</text><rect x="30" y="500" width="280" height="50" rx="12" fill="#dc2626"/><text x="55" y="532" fill="#fff" font-size="17" font-weight="800">Cron über Weboberfläche anwenden</text><rect x="30" y="575" width="525" height="50" rx="12" fill="#0b1220" stroke="#27272a"/><text x="50" y="607" fill="#bbf7d0" font-size="15">*/60 * * * * curl -X POST .../api/workflow/run</text></g></g></svg>
